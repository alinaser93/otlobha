<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A3D2A" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="اطلبها" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>اطلبها · Otlobha — متجرك العراقي الطازج</title>

    <!-- Link preview (Open Graph + Twitter) — generic site card.
         Per-product previews can be added later via a serverless OG function. -->
    <meta name="description" content="اطلبها — متجر بقالة عراقي. خضار وفواكه ومؤونة طازجة توصل لباب بيتك في السماوة." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="اطلبها" />
    <meta property="og:title" content="اطلبها · Otlobha — متجرك العراقي الطازج" />
    <meta property="og:description" content="خضار وفواكه ومؤونة طازجة توصل لباب بيتك في السماوة. اطلبها الآن." />
    <meta property="og:url" content="https://otlobha.netlify.app/" />
    <meta property="og:image" content="https://otlobha.netlify.app/icons/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="اطلبها · Otlobha" />
    <meta name="twitter:description" content="متجرك العراقي الطازج — توصيل في السماوة." />
    <meta name="twitter:image" content="https://otlobha.netlify.app/icons/icon-512.png" />

    <!-- Display: Cairo · Body: Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- OneSignal Web Push SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function (OneSignal) {
        await OneSignal.init({
          appId: '618c2fc7-896a-41e0-98b6-9ddca66b6f97',
        });
      });
    </script>

    <!-- apply saved theme before paint (no flash) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('otlobha-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
