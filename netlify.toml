# Netlify configuration for Otlobha (Vite + React)
# With this file, Netlify detects everything automatically on import.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — harmless for this single-page site, and ready
# in case you add client-side routing later. (Remove if not needed.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
